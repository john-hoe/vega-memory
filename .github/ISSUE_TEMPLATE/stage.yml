name: Stage issue (S0-S6)
description: File a stage-level tracking issue for Vega Phase 8+ pipeline stages.
title: "[S<N>] <Stage name>"
labels:
  - "phase-8-audit"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for Phase 8 stage tracking only. GitHub issue forms do not
        template-substitute the stage number into labels, so apply the canonical
        `stage-0` through `stage-6` label after the issue is created. Prefer
        `bash tools/github/create-stage-issues.sh` for canonical stage issue
        creation, or add the stage label manually post-create.

        Phase 8 conventions:
        - Replace `<N>` in the title with the selected stage number.
        - Keep the issue scope aligned to the approved brief set for the stage.
        - Verify byte-locked paths before merge.
        - Map the final SEAL commit SHA back to the Notion `GitHub/Commit 链接` field.
        - If you need concrete per-stage labels or issue creation, prefer `bash tools/github/create-stage-issues.sh`.
  - type: dropdown
    id: stage_number
    attributes:
      label: Stage number
      description: Which pipeline stage does this issue track?
      options:
        - S0 (contracts + ingestion)
        - S1 (retrieval)
        - S2 (promotion)
        - S3 (wiki)
        - S4 (fact-claim)
        - S5 (graph)
        - S6 (archive)
    validations:
      required: true
  - type: input
    id: p8_task_links
    attributes:
      label: P8-NNN task references
      description: Comma-separated list of Notion P8 task IDs.
      placeholder: "P8-037, P8-038.5"
  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: Target milestone / sprint / phase.
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Bullet list of conditions that close this issue.
      placeholder: "- [ ] ..."
    validations:
      required: true
