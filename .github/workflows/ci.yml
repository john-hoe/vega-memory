name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract enum PR guard
        env:
          VEGA_CONTRACT_GUARD_EVENT_NAME: ${{ github.event_name }}
          VEGA_CONTRACT_GUARD_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          VEGA_CONTRACT_GUARD_HEAD: HEAD
          VEGA_CONTRACT_GUARD_PR_BODY: ${{ github.event.pull_request.body }}
        run: npm run guard:contract-enums

      - name: Run contract import guard
        run: npm run lint:contracts-guard

      - name: Build
        run: npm run build

      - name: Run tests
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          npm test 2>&1 | tee test-results/node-test-output.txt

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          if-no-files-found: warn

      - name: Run npm audit
        continue-on-error: true
        run: npm audit --audit-level=moderate
