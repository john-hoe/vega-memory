version: "3.9"

services:
  vega:
    build: .
    command: ["node", "dist/scheduler/index.js"]
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      VEGA_DB_PATH: /app/data/memory.db
      VEGA_API_PORT: "3000"
      VEGA_API_KEY: ${VEGA_API_KEY:-dev-api-key}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      - ollama
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H 'Authorization: Bearer $$VEGA_API_KEY' http://localhost:3000/api/health >/dev/null || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
