# Vega backup targets + retention policy (P8-036).
#
# Schema (zod-enforced in src/backup/registry.ts):
#   - targets: [string, ...]
#   - retention:
#       max_count: integer > 0
#       min_days: integer >= 0
#   - exclude_globs: [string]
#   - scheduler:
#       enabled: boolean
#       interval_ms: integer > 0
#
targets:
  - "${HOME}/.vega/data/vega.db"
retention:
  max_count: 7
  min_days: 1
exclude_globs: []
scheduler:
  enabled: true
  interval_ms: 86400000
