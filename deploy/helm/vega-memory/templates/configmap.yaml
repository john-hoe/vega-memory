apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vega-memory.fullname" . }}
  labels:
    {{- include "vega-memory.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.ollama.enabled }}
  OLLAMA_BASE_URL: "http://127.0.0.1:11434"
  {{- end }}
  {{- if .Values.redis.enabled }}
  VEGA_REDIS_HOST: {{ .Values.redis.host | quote }}
  VEGA_REDIS_PORT: {{ .Values.redis.port | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  VEGA_PG_HOST: {{ .Values.postgresql.host | quote }}
  VEGA_PG_PORT: {{ .Values.postgresql.port | quote }}
  {{- end }}
