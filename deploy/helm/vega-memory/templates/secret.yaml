{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "vega-memory.fullname" .)) }}
  labels:
    {{- include "vega-memory.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.secret.apiKey "dev-api-key" }}
  {{- fail "secret.apiKey cannot use the insecure default value 'dev-api-key'; set a strong random value or supply existingSecret." }}
  {{- end }}
  {{ .Values.existingSecretKey }}: {{ required "secret.apiKey must be set when secret.create=true; set a strong random value or supply existingSecret." .Values.secret.apiKey | quote }}
{{- end }}
