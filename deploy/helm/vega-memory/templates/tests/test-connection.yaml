apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "vega-memory.fullname" . }}-test-connection"
  labels:
    {{- include "vega-memory.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.8.0
      command:
        - sh
        - -ec
        - >
          curl -fsS http://{{ include "vega-memory.fullname" . }}:{{ .Values.service.port }}/api/health
  restartPolicy: Never
